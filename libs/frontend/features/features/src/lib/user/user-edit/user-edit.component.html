<div *ngIf="loading" class="loading-spinner">
  <p>Loading...</p>
</div>

<div *ngIf="!loading">
  <form [formGroup]="editForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" formControlName="username" type="text" placeholder="Enter your username" />
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input id="email" formControlName="email" type="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label for="password">New Password (optional)</label>
      <input id="password" formControlName="password" type="password" placeholder="Leave blank to keep current password" />
    </div>

    <div class="form-group">
      <label for="profileImgUrl">Profile Image URL</label>
      <input id="profileImgUrl" formControlName="profileImgUrl" type="text" placeholder="Enter image URL" />
    </div>

    <div class="form-group">
      <label for="gender">Gender</label>
      <select id="gender" formControlName="gender" class="form-control">
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="Unknown">Unknown</option>
      </select>
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <select id="role" formControlName="role">
        <option value="user">User</option>
        <option value="clubowner">Club Owner</option>
      </select>
    </div>
    
    <button type="submit" class="btn btn-primary" [disabled]="editForm.invalid">Save</button>
  </form>
</div>
